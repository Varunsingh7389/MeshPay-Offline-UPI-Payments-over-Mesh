# =====================================================
# SERVER
# =====================================================

server.port=${PORT:8080}

# =====================================================
# H2 DATABASE
# =====================================================

spring.datasource.url=jdbc:h2:mem:upimesh
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Keep data/schema while developing
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# =====================================================
# H2 WEB CONSOLE
# =====================================================

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =====================================================
# LOGGING
# =====================================================

logging.level.com.demo.upimesh=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# =====================================================
# UPI MESH CONFIGURATION
# =====================================================

# How long packet hashes remain in the idempotency cache
upi.mesh.idempotency-ttl-seconds=86400

# Reject packets older than this (replay protection)
upi.mesh.packet-max-age-seconds=86400